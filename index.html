<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Bird</title>
<style>
  body { margin:0; overflow:hidden; background:#222; }
  canvas { display:block; margin:auto; }
  #ui {
    position:absolute;
    top:10px;
    right:10px;
    display:flex;
    gap:10px;
  }
  button {
    font-size:18px;
    padding:8px 12px;
    border:none;
    border-radius:6px;
  }
</style>
</head>

<body>
<canvas id="game"></canvas>

<div id="ui">
  <button id="pauseBtn">⏸</button>
  <button id="fsBtn">⛶</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let WIDTH = window.innerWidth;
let HEIGHT = window.innerHeight;

canvas.width = WIDTH;
canvas.height = HEIGHT;

// ---------- GAME STATE ----------
let GRAVITY = 0.1;
let JUMP = -5;

let bird = {
  x: WIDTH * 0.25,
  y: HEIGHT/2,
  vel: 0
};

let pipes = [];
let clouds = [];
let score = 0;
let alive = true;
let paused = false;

let lastPipeTime = 0;

// ---------- INIT CLOUDS ----------
for (let i = 0; i < 6; i++) {
  clouds.push({
    x: Math.random()*WIDTH,
    y: Math.random()*HEIGHT*0.5,
    size: 40 + Math.random()*40,
    speed: 0.3 + Math.random()
  });
}

// ---------- SOUND ----------
const passSound = new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");

// ---------- PIPE ----------
function createPipe() {
  let gap = 160 + Math.random()*80;
  let top = 50 + Math.random()*(HEIGHT - gap - 150);

  return {
    x: WIDTH,
    top: top,
    bottom: top + gap,
    passed: false
  };
}

// ---------- INPUT ----------
function flap() {
  if (!paused) {
    if (alive) {
      bird.vel = JUMP;
    } else {
      resetGame();
    }
  }
}

document.addEventListener("keydown", e => {
  if (e.code === "Space") flap();

  if (e.code === "Escape") {
    paused = !paused;
  }
});

canvas.addEventListener("mousedown", flap);
canvas.addEventListener("touchstart", flap);

// ---------- UI BUTTONS ----------
document.getElementById("pauseBtn").onclick = () => {
  paused = !paused;
};

document.getElementById("fsBtn").onclick = () => {
  if (!document.fullscreenElement) {
    document.body.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
};

// ---------- RESET ----------
function resetGame() {
  bird.y = HEIGHT/2;
  bird.vel = 0;
  pipes = [];
  score = 0;
  alive = true;
}

// ---------- DRAW ----------
function drawBackground() {
  let grad = ctx.createLinearGradient(0,0,0,HEIGHT);
  grad.addColorStop(0,"#87CEEB");
  grad.addColorStop(1,"#E0F7FF");
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,WIDTH,HEIGHT);

  ctx.fillStyle = "white";
  for (let c of clouds) {
    c.x -= c.speed;
    if (c.x < -c.size) c.x = WIDTH + c.size;

    ctx.beginPath();
    ctx.arc(c.x, c.y, c.size*0.4, 0, Math.PI*2);
    ctx.arc(c.x+c.size*0.4, c.y, c.size*0.5, 0, Math.PI*2);
    ctx.arc(c.x+c.size*0.8, c.y, c.size*0.4, 0, Math.PI*2);
    ctx.fill();
  }
}

function drawBird() {
  let angle = Math.max(-0.5, Math.min(1.2, bird.vel * 0.05));

  ctx.save();
  ctx.translate(bird.x, bird.y);
  ctx.rotate(angle);

  ctx.fillStyle = "yellow";
  ctx.beginPath();
  ctx.ellipse(0,0,25,18,0,0,Math.PI*2);
  ctx.fill();

  ctx.fillStyle = "white";
  ctx.beginPath();
  ctx.arc(10,-5,5,0,Math.PI*2);
  ctx.fill();

  ctx.fillStyle = "black";
  ctx.beginPath();
  ctx.arc(12,-5,2,0,Math.PI*2);
  ctx.fill();

  ctx.fillStyle = "orange";
  ctx.beginPath();
  ctx.moveTo(15,0);
  ctx.lineTo(25,5);
  ctx.lineTo(15,10);
  ctx.fill();

  ctx.restore();
}

function drawPipes(p) {
  ctx.fillStyle = "#2ecc71";
  ctx.fillRect(p.x,0,60,p.top);
  ctx.fillRect(p.x,p.bottom,60,HEIGHT);
}

// ---------- LOOP ----------
function loop(time) {
  drawBackground();

  if (!paused && alive) {
    bird.vel += GRAVITY;
    bird.y += bird.vel;

    if (time - lastPipeTime > 1500) {
      pipes.push(createPipe());
      lastPipeTime = time;
    }

    for (let p of pipes) {
      p.x -= 3;

      drawPipes(p);

      // collision
      if (
        bird.x < p.x+60 &&
        bird.x+30 > p.x &&
        (bird.y < p.top || bird.y+30 > p.bottom)
      ) {
        alive = false;
      }

      // score
      if (!p.passed && p.x < bird.x) {
        p.passed = true;
        score++;
        passSound.currentTime = 0;
        passSound.play();
      }
    }

    pipes = pipes.filter(p => p.x > -60);

    if (bird.y < 0 || bird.y > HEIGHT) {
      alive = false;
    }
  } else {
    for (let p of pipes) drawPipes(p);
  }

  drawBird();

  ctx.fillStyle = "black";
  ctx.font = "30px Arial";
  ctx.fillText(score, 20, 40);

  if (paused) {
    ctx.fillText("PAUSED", WIDTH/2 - 60, HEIGHT/2);
  }

  if (!alive) {
    ctx.fillText("Game Over", WIDTH/2 - 90, HEIGHT/2);
    ctx.fillText("Tap / Click to Restart", WIDTH/2 - 140, HEIGHT/2 + 40);
  }

  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
</body>
</html>
