<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fair Flappy Bird</title>

<style>
body { margin:0; overflow:hidden; background:#222; }
canvas { display:block; margin:auto; }

#ui {
  position:absolute;
  top:10px;
  right:10px;
  display:flex;
  gap:10px;
}

button {
  font-size:18px;
  padding:8px 12px;
  border:none;
  border-radius:6px;
}
</style>
</head>

<body>
<canvas id="game"></canvas>

<div id="ui">
  <button id="pauseBtn">⏸</button>
  <button id="fsBtn">⛶</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let WIDTH = window.innerWidth;
let HEIGHT = window.innerHeight;

canvas.width = WIDTH;
canvas.height = HEIGHT;

// ---------------- TIME ----------------
let lastTime = 0;

// ---------------- GAME CONSTANTS ----------------
const GRAVITY = 1400;
const JUMP = -450;
const PIPE_SPEED = 260;

const PIPE_WIDTH = 60;
const PIPE_GAP = 170;

// ---------------- STATE ----------------
let bird = {
  x: WIDTH * 0.25,
  y: HEIGHT / 2,
  vel: 0
};

let pipes = [];
let clouds = [];
let score = 0;

let alive = true;
let paused = false;

let pipeTimer = 0;

// ---------------- SOUND ----------------
const passSound = new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");

// ---------------- CLOUDS ----------------
for (let i = 0; i < 6; i++) {
  clouds.push({
    x: Math.random()*WIDTH,
    y: Math.random()*HEIGHT*0.5,
    size: 40 + Math.random()*40,
    speed: 25 + Math.random()*35
  });
}

// ---------------- INPUT ----------------
function flap() {
  if (alive && !paused) {
    bird.vel = JUMP;
  } else if (!alive) {
    resetGame();
  }
}

document.addEventListener("keydown", e => {
  if (e.code === "Space") flap();
  if (e.code === "Escape") paused = !paused;
});

canvas.addEventListener("mousedown", flap);
canvas.addEventListener("touchstart", flap);

document.getElementById("pauseBtn").onclick = () => paused = !paused;

document.getElementById("fsBtn").onclick = () => {
  if (!document.fullscreenElement) document.body.requestFullscreen();
  else document.exitFullscreen();
};

// ---------------- RESET ----------------
function resetGame() {
  bird.y = HEIGHT / 2;
  bird.vel = 0;
  pipes = [];
  score = 0;
  alive = true;
}

// =====================================================
// 🔧 ONLY CHANGE: PIPE GENERATION (FIXED RULE ADDED)
// =====================================================

let lastPipeTop = HEIGHT / 2;

function createPipe() {

  let maxTop = HEIGHT - PIPE_GAP - 80;
  let minTop = 80;

  let cloudLength = 50;          // average cloud size reference
  let maxStep = cloudLength * 5; // 🚨 max difference rule

  let targetTop = minTop + Math.random() * (maxTop - minTop);

  // clamp based on previous pipe
  let diff = targetTop - lastPipeTop;

  if (diff > maxStep) targetTop = lastPipeTop + maxStep;
  if (diff < -maxStep) targetTop = lastPipeTop - maxStep;

  targetTop = Math.max(minTop, Math.min(maxTop, targetTop));

  lastPipeTop = targetTop;

  return {
    x: WIDTH,
    top: targetTop,
    bottom: targetTop + PIPE_GAP,
    passed: false
  };
}

// ---------------- DRAW BIRD ----------------
function drawBird() {
  ctx.save();
  ctx.translate(bird.x, bird.y);

  ctx.fillStyle = "yellow";
  ctx.beginPath();
  ctx.ellipse(0,0,25,18,0,0,Math.PI*2);
  ctx.fill();

  ctx.fillStyle = "white";
  ctx.beginPath();
  ctx.arc(10,-5,5,0,Math.PI*2);
  ctx.fill();

  ctx.fillStyle = "black";
  ctx.beginPath();
  ctx.arc(12,-5,2,0,Math.PI*2);
  ctx.fill();

  ctx.fillStyle = "orange";
  ctx.beginPath();
  ctx.moveTo(15,0);
  ctx.lineTo(25,5);
  ctx.lineTo(15,10);
  ctx.fill();

  ctx.restore();
}

// ---------------- CLOUDS ----------------
function drawClouds(dt) {
  ctx.fillStyle = "white";

  for (let c of clouds) {
    c.x -= c.speed * dt;
    if (c.x < -c.size) c.x = WIDTH + c.size;

    ctx.beginPath();
    ctx.arc(c.x, c.y, c.size*0.4, 0, Math.PI*2);
    ctx.arc(c.x+c.size*0.4, c.y, c.size*0.5, 0, Math.PI*2);
    ctx.arc(c.x+c.size*0.8, c.y, c.size*0.4, 0, Math.PI*2);
    ctx.fill();
  }
}

// ---------------- PIPES ----------------
function drawPipe(p) {
  ctx.fillStyle = "#2ecc71";
  ctx.fillRect(p.x, 0, PIPE_WIDTH, p.top);
  ctx.fillRect(p.x, p.bottom, PIPE_WIDTH, HEIGHT);
}

// ---------------- LOOP ----------------
function loop(time) {

  if (!lastTime) lastTime = time;
  let dt = (time - lastTime) / 1000;
  lastTime = time;

  ctx.fillStyle = "#87CEEB";
  ctx.fillRect(0,0,WIDTH,HEIGHT);

  drawClouds(dt);

  if (!paused && alive) {

    bird.vel += GRAVITY * dt;
    bird.y += bird.vel * dt;

    pipeTimer += dt;
    if (pipeTimer > 1.4) {
      pipes.push(createPipe());
      pipeTimer = 0;
    }

    for (let p of pipes) {
      p.x -= PIPE_SPEED * dt;

      drawPipe(p);

      if (
        bird.x < p.x + PIPE_WIDTH &&
        bird.x + 30 > p.x &&
        (bird.y < p.top || bird.y + 30 > p.bottom)
      ) {
        alive = false;
      }

      if (!p.passed && p.x < bird.x) {
        p.passed = true;
        score++;
        passSound.currentTime = 0;
        passSound.play();
      }
    }

    pipes = pipes.filter(p => p.x > -100);

    if (bird.y < 0 || bird.y > HEIGHT) {
      alive = false;
    }
  }

  for (let p of pipes) drawPipe(p);
  drawBird();

  ctx.fillStyle = "black";
  ctx.font = "30px Arial";
  ctx.fillText(score, 20, 40);

  if (paused) ctx.fillText("PAUSED", WIDTH/2 - 60, HEIGHT/2);
  if (!alive) ctx.fillText("Game Over", WIDTH/2 - 90, HEIGHT/2);

  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>

</body>
</html>
